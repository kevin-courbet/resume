version: "3"

tasks:
  sync:
    desc: Install Python dependencies with uv
    cmds:
      - uv sync

  build:
    desc: Generate standard and AEROW DOCX/PDF plus HTML artifacts
    cmds:
      - uv run cv-build

  build:no-docx-pdf:
    desc: Generate artifacts available without LibreOffice
    cmds:
      - uv run cv-build --skip-docx-pdf

  build:aerow:
    desc: Generate only AEROW DOCX/PDF artifacts
    cmds:
      - uv run cv-build --target aerow

  clean:
    desc: Remove generated artifacts
    cmds:
      - rm -rf dist
